[[permission]]
identifier = "allow-app-commands"
description = "Allow all PromptSack vault/catalog commands from the main window"
commands.allow = [
  "vault_status",
  "vault_open",
  "vault_close",
  "session_unlock",
  "session_lock",
  "session_status",
  "prompts_list",
  "prompts_get",
  "prompts_create",
  "prompts_update",
  "prompts_delete",
  "prompts_search",
  "prompts_bulk_move",
  "prompts_bulk_delete",
  "prompts_copy_body",
  "folders_list",
  "folders_create",
  "folders_rename",
  "folders_set_locked",
  "folders_delete",
  "folders_export",
  "smart_folders_list",
  "smart_folders_create",
  "smart_folders_delete",
  "tags_list",
  "tags_rename",
  "tags_delete",
  "data_export_all",
  "data_export_prompts",
  "data_import",
  "data_export_to_file",
  "data_import_from_file",
  "settings_get",
  "settings_set_embedding",
  "settings_clear_embedding_api_key",
  "settings_set_remember_lock",
  "app_version"
]
